<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">Contact Form</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
        <li class="nav-item"><a href="info.html" class="nav-link">Feedback</a></li>
        <li class="nav-item"><a href="contact.html" class="nav-link">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-5">
  <p class="text-center text-success mb-4 h2">Visitor Contact Form</p>
  <form class="needs-validation" novalidate>

    <fieldset class="border p-3 mb-4 rounded">
      <legend class="fw-bold">Visitor Details</legend>
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" placeholder="Enter your name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Enter your email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="tel" class="form-control" placeholder="Enter your phone number" minlength="6" maxlength="10" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Age</label>
        <input type="number" class="form-control" placeholder="Enter your age" min="18" max="60" required>
      </div>
    </fieldset>

    <fieldset class="border p-3 mb-4 rounded">
      <legend class="fw-bold">Travel Information</legend>
      <p class="fw-bold">Types of Travel:</p>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="travel_type" value="Solo">
        <label class="form-check-label">Solo</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="travel_type" value="Family">
        <label class="form-check-label">Family</label>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="radio" name="travel_type" value="Friends">
        <label class="form-check-label">Friends Group</label>
      </div>

      <p class="fw-bold">What are you interested in?</p>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="History & monuments">
        <label class="form-check-label">History & monuments</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="Nature & lakes">
        <label class="form-check-label">Nature & lakes</label>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" value="Food & Shopping">
        <label class="form-check-label">Food & Shopping</label>
      </div>

      <label class="form-label fw-bold">Planned month of visit:</label>
      <input type="month" class="form-control">
    </fieldset>

    <fieldset class="border p-3 mb-4 rounded">
      <legend class="fw-bold">Your Message</legend>
      <div class="mb-3">
        <label class="form-label">Message / Question:</label>
        <textarea class="form-control" rows="4" placeholder="Enter your message here" required></textarea>
      </div>
    </fieldset>

    <div class="text-center">
      <button type="submit" class="btn btn-success me-2">Submit</button>
      <button type="reset" class="btn btn-danger">Reset</button>
    </div>
  </form>
</main>

<footer class="bg-dark text-white text-center py-3 mt-5">
  <a href="index.html" class="text-white text-decoration-none">Back to Home</a>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
