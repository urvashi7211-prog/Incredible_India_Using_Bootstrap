<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Flip Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.flip-card {
  perspective: 1000px;
}

.flip-inner {
  transition: transform 0.6s;
  transform-style: preserve-3d;
  position: relative;
}

.flip-card:hover .flip-inner {
  transform: rotateY(180deg);
}

.flip-front, .flip-back {
  backface-visibility: hidden;
  position: absolute;
  width: 100%;
  height: 100%;
}

.flip-back {
  transform: rotateY(180deg);
}
</style>

</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="flip-card" style="width: 300px; height: 400px;">
  
  <div class="flip-inner h-100">

    <!-- Front (Image) -->
    <div class="flip-front">
      <div class="card h-100 shadow">
        <img src="image/ahemdabad_.jpeg" class="card-img-top h-100">
      </div>
    </div>

    <!-- Back (Info) -->
    <div class="flip-back">
      <div class="card h-100 bg-primary text-white d-flex justify-content-center align-items-center text-center p-3">
        <h5>Ahmedabad</h5>
        <p>Beautiful city of Gujarat with rich culture and modern development.</p>
      </div>
    </div>

  </div>

</div>

</body>
</html>
